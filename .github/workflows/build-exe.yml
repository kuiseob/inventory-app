name: Windows EXE 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller matplotlib

      - name: 아이콘 생성
        run: python create_ico.py

      - name: EXE 빌드
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name="재고관리" `
            --icon=inventory.ico `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_tkagg `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            inventory_app.py

      - name: 버전 태그 생성
        id: tag
        run: |
          $date = Get-Date -Format "yyyy.MM.dd-HHmm"
          echo "tag=v$date" >> $env:GITHUB_OUTPUT

      - name: GitHub 릴리즈에 EXE 저장
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "재고관리 ${{ steps.tag.outputs.tag }}"
          body: |
            ## 재고관리 시스템 Windows 실행파일

            ### 사용 방법
            1. 아래 **재고관리.exe** 를 다운로드
            2. 더블클릭으로 실행

            ### 주요 기능
            - 원자재 / 반제품 / 완제품 재고 관리
            - BOM 기반 생산 처리
            - 입출고 이력 조회
            - 재고 분석 그래프
          files: dist/재고관리.exe
          draft: false
          prerelease: false
